# MELHORIA - Perfil de desenvolvimento com configurações para facilitar debug
# MELHORIA - H2 console HABILITADO apenas em desenvolvimento
# MELHORIA - Logs DEBUG para Spring Security e aplicação
# MELHORIA - Token JWT com duração maior (24h) para facilitar testes

# Development environment configuration

# H2 console - enabled for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Datasource (in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG

# MELHORIA - JWT secret deve ser longo e complexo (em produção usar variável de ambiente)
# MELHORIA - Expiração de 24h em desenvolvimento para facilitar testes
jwt.secret=mySecretKeyForJWTTokenGenerationThatShouldBeStoredInVaultOrSecureLocation1234567890
jwt.expiration=86400000

# MELHORIA - Actuator com todos endpoints expostos em desenvolvimento
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Allow H2 console frames
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
