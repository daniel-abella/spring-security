# MELHORIA - Perfil de produção com segurança reforçada
# MELHORIA - H2 console DESABILITADO em produção por segurança
# MELHORIA - Logs mínimos (INFO/WARN) para melhor performance
# MELHORIA - JWT secret via variável de ambiente ${JWT_SECRET}
# MELHORIA - Token JWT com duração reduzida (1h) para segurança
# MELHORIA - Detalhes de erro ocultados para não expor informações internas

# Production environment configuration

# H2 console - DISABLED for production
spring.h2.console.enabled=false

# Datasource (use real database in production, e.g., PostgreSQL, MySQL)
# Uncomment and configure for your production database
# spring.datasource.url=jdbc:postgresql://localhost:5432/proddb
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driverClassName=org.postgresql.Driver

# For demonstration purposes, using H2 file-based database
spring.datasource.url=jdbc:h2:file:./data/proddb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.com.example.demo=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# MELHORIA - JWT secret DEVE vir de variável de ambiente em produção
# MELHORIA - Expiração de 1h em produção para maior segurança
jwt.secret=${JWT_SECRET:pleaseChangeThisSecretInProductionToAVeryLongAndSecureRandomString12345}
jwt.expiration=3600000

# MELHORIA - Actuator endpoints restritos em produção
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# MELHORIA - Oculta mensagens e stack traces de erros para não vazar informações
server.error.include-message=never
server.error.include-stacktrace=never
